services:
  vaultecho:
    build: .
    image: vaultecho:latest
    ports:
      - "127.0.0.1:${PORT:-8787}:8787"
    env_file:
      - .env
    environment:
      BIND_HOST: 0.0.0.0
      CONFIG_PATH: /data/docker-config.json
    volumes:
      - ${OBSIDIAN_VAULT_PATH:-./vault}:/vault
      - ./data:/data
    restart: unless-stopped
