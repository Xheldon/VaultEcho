name: Release Docker image

# Run manually from the Actions tab ("Run workflow"). It:
#   1. builds a multi-arch (amd64 + arm64) image and pushes it to Docker Hub
#   2. creates the matching v<version> git tag and a GitHub Release
# The version comes from package.json, so no tag has to be pushed by hand.
# Dispatch-only on purpose: the workflow creates the tag itself, so there is no
# separate tag-push trigger that would run the whole thing a second time.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  Docker Hub username (also used as the image namespace)
#   DOCKERHUB_TOKEN     Docker Hub access token with Read/Write scope
# The image is published as ${DOCKERHUB_USERNAME}/vaultecho:<version> and :latest.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vaultecho:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vaultecho:latest

      - name: Create tag and GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            Docker image: `${{ secrets.DOCKERHUB_USERNAME }}/vaultecho:${{ steps.version.outputs.version }}` (also `:latest`), multi-arch linux/amd64 + linux/arm64.
