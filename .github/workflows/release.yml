name: Release Docker image

# Builds a multi-arch (amd64 + arm64) image and pushes it to Docker Hub.
# Triggers automatically when a version tag like v0.2.16 is pushed, and can
# also be run manually from the Actions tab (version is read from package.json).
#
# Required repository secrets:
#   DOCKERHUB_USERNAME  Docker Hub username (also used as the image namespace)
#   DOCKERHUB_TOKEN     Docker Hub access token with Read/Write scope
# The image is published as ${DOCKERHUB_USERNAME}/vaultecho:<version> and :latest.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vaultecho:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/vaultecho:latest
